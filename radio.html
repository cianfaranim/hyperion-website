<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyperion Radio — Live Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080808;
      --surface:   #0f0f0f;
      --border:    #1e1e1e;
      --gold:      #c8a96e;
      --gold-dim:  #7a6440;
      --text:      #e8e2d9;
      --muted:     #5a5550;
      --red:       #e05a3a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Grid lines ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 3rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .logo-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--red);
      text-transform: uppercase;
      border: 1px solid var(--red);
      padding: 0.35rem 0.75rem;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .live-pill.visible { opacity: 1; }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── Main ── */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 4rem;
    }

    /* ── Hero text ── */
    .hero {
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .hero-title span {
      color: var(--gold);
    }

    .hero-sub {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── Player card ── */
    .player-card {
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 2.5rem;
      position: relative;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .player-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ── Waveform visualiser ── */
    .visualiser {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 48px;
      margin-bottom: 2rem;
    }

    .bar {
      width: 3px;
      background: var(--gold-dim);
      border-radius: 2px;
      height: 8px;
      transition: background 0.3s;
    }

    .playing .bar {
      background: var(--gold);
      animation: wave var(--dur) var(--delay) ease-in-out infinite alternate;
    }

    @keyframes wave {
      from { height: 4px; }
      to   { height: var(--max-h); }
    }

    /* ── Now playing ── */
    .now-playing-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .track-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 1.5em;
      transition: opacity 0.3s;
    }

    .track-artist {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--gold);
      margin-top: 0.25rem;
      min-height: 1.2em;
      transition: opacity 0.3s;
    }

    .track-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .play-btn:hover {
      background: rgba(200, 169, 110, 0.08);
      border-color: var(--gold);
    }

    .play-btn svg { width: 20px; height: 20px; fill: currentColor; }

    .volume-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .volume-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--gold);
      border-radius: 50%;
      cursor: pointer;
    }

    input[type=range]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: var(--gold);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    .volume-val {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      text-align: right;
    }



    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--gold); }

    .footer-links { display: flex; gap: 2rem; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <span class="logo-wordmark">Hyperion Radio</span>
      <span class="logo-sub">by Hyperion VTC</span>
    </div>
    <div class="live-pill" id="livePill">
      <span class="live-dot"></span>
      Live
    </div>
  </header>

  <main>
    <div class="hero">
      <p class="hero-eyebrow">Internet Radio · 192kbps MP3</p>
      <h1 class="hero-title">On The<br /><span>Road.</span></h1>
      <p class="hero-sub">Music for the long haul. Tune in while you drive across America or Europe.</p>
    </div>

    <div class="player-card">

      <!-- Waveform -->
      <div class="visualiser" id="visualiser"></div>

      <!-- Now playing -->
      <p class="now-playing-label">Now Playing</p>
      <p class="track-title" id="trackTitle">—</p>
      <p class="track-artist" id="trackArtist"></p>

      <hr class="track-divider" />

      <!-- Controls -->
      <div class="controls">
        <button class="play-btn" id="playBtn" aria-label="Play / Pause">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="volume-wrap">
          <span class="volume-label">Volume</span>
          <input type="range" id="volumeSlider" min="0" max="100" value="80" />
          <span class="volume-val" id="volumeVal">80%</span>
        </div>
      </div>



    </div>
  </main>

  <footer>
    <span>© 2026 Hyperion Logistics VTC</span>
    <div class="footer-links">
      <a href="https://hyperionvtc.com">Main Site</a>
      <a href="https://discord.gg/KaVtpMR6Zs">Discord</a>
      <a href="https://drivers.hyperionvtc.com">Drivers Hub</a>
    </div>
  </footer>

</div>

<script>
  const STREAM_URL  = 'https://radio.hyperionvtc.com/listen/hyperion_radio/radio.mp3';
  const API_URL     = 'https://radio.hyperionvtc.com/api/nowplaying/1';
  const POLL_MS     = 10000;

  let audio = null;
  let playing = false;

  // ── Waveform bars ──
  const vis = document.getElementById('visualiser');
  const BAR_COUNT = 28;
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    const maxH = Math.floor(Math.random() * 32) + 12;
    b.style.setProperty('--max-h', maxH + 'px');
    b.style.setProperty('--dur', (0.4 + Math.random() * 0.5).toFixed(2) + 's');
    b.style.setProperty('--delay', (Math.random() * 0.4).toFixed(2) + 's');
    vis.appendChild(b);
  }

  // ── Play / Pause ──
  const playBtn    = document.getElementById('playBtn');
  const playIcon   = document.getElementById('playIcon');
  const pauseIcon  = document.getElementById('pauseIcon');
  const livePill   = document.getElementById('livePill');

  playBtn.addEventListener('click', () => {
    if (!playing) {
      audio = new Audio(STREAM_URL);
      audio.volume = document.getElementById('volumeSlider').value / 100;
      audio.play();
      playing = true;
      playIcon.style.display  = 'none';
      pauseIcon.style.display = '';
      vis.classList.add('playing');
      livePill.classList.add('visible');
    } else {
      audio.pause();
      audio.src = '';
      audio = null;
      playing = false;
      playIcon.style.display  = '';
      pauseIcon.style.display = 'none';
      vis.classList.remove('playing');
      livePill.classList.remove('visible');
    }
  });

  // ── Volume ──
  const slider   = document.getElementById('volumeSlider');
  const volLabel = document.getElementById('volumeVal');

  slider.addEventListener('input', () => {
    const v = slider.value;
    volLabel.textContent = v + '%';
    if (audio) audio.volume = v / 100;
  });

  // ── Now playing API ──
  async function fetchNowPlaying() {
    try {
      const res  = await fetch(API_URL);
      const data = await res.json();
      const song = data?.now_playing?.song;
      const listeners = data?.listeners?.current ?? '—';

      document.getElementById('trackTitle').textContent   = song?.title  || '—';
      document.getElementById('trackArtist').textContent  = song?.artist || '';
      document.getElementById('listenerCount').textContent = listeners;
    } catch (e) {
      console.warn('Could not fetch now playing:', e);
    }
  }

  fetchNowPlaying();
  setInterval(fetchNowPlaying, POLL_MS);
</script>
</body>
</html>
